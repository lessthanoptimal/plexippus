[versions]
javax = "1.0"
lombok = "1.18.42"
kotlin = "2.3.0"
junit5 = "5.14.2"
junitPlatform = "1.14.2"
spotless = "7.2.1"
gversion = "1.10.3"
ejml = "0.44.1-SNAPSHOT"

[libraries]
javax-annotations = { group = "javax.annotation", name = "jsr250-api", version.ref = "javax" }
lombok = { group = "org.projectlombok", name = "lombok", version.ref = "lombok" }
junit5 = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit5" }
junit5-engine = { module = "org.junit.jupiter:junit-jupiter-engine", version.ref = "junit5" }
junit5-launcher = { module = "org.junit.platform:junit-platform-launcher", version.ref = "junitPlatform" }
ejml-core = { group = "org.ejml", name = "ejml-core", version.ref = "ejml" }

[bundles]

[plugins]
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
gversion = { id = "com.peterabeles.gversion", version.ref = "gversion" }
